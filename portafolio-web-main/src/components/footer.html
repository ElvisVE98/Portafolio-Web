<!--
  footer.html — Componente: Pie de Página
  =========================================
  El <footer> es el elemento semántico HTML para el pie de página.
  Contiene información secundaria: autoría, año y descripción breve.

  CÓMO EDITAR:
    · Nombre: edita el texto dentro del <strong>
    · Año: actualiza el número © al año vigente
    · Descripción: edita el segundo <p>
-->

<!--
  <footer> → etiqueta semántica HTML5 para el pie de página.
  Los motores de búsqueda y lectores de pantalla identifican
  este bloque como información secundaria/de cierre del documento.
-->
<footer>
    <div class="container">
        <p>Diseñado y Desarrollado por <strong>Elvis Velasquez</strong> © 2026</p>
        <!-- .footer-subtitle → texto secundario del footer (ver footer.css) -->
        <p class="footer-subtitle">
            Junior Software Developer | Ingeniero en Informática
        </p>
    </div>
</footer>
