<!DOCTYPE html>
<!--
  index.html — Shell principal de la aplicación
  ===============================================
  Este archivo es el "esqueleto" de la página.
  No contiene el HTML de las secciones directamente.
  Cada sección vive en su propio archivo en src/components/
  y se inyecta aquí en tiempo de ejecución por dist/main.js.

  ESTRUCTURA DE ARCHIVOS:
    index.html          ← Este archivo (punto de entrada)
    src/
      components/       ← HTML de cada sección
        nav.html
        hero.html
        experience.html
        certifications.html
        projects.html
        contact.html
        footer.html
      css/
        main.css        ← Importa todos los módulos CSS
        base.css, nav.css, hero.css, timeline.css ...
      ts/
        main.ts         ← TypeScript fuente (entry point)
        loader.ts       ← Carga los componentes HTML
        navigation.ts   ← Lógica del menú
    dist/
      main.js           ← JavaScript compilado (NO editar aquí)

  IMPORTANTE: Este sitio necesita un servidor local para funcionar.
  Usa la extensión "Live Server" de VS Code o ejecuta:
    npx serve .
  desde la terminal en esta carpeta.
-->
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elvis Velasquez | Junior Software Developer</title>

    <!-- SEO: información para motores de búsqueda -->
    <meta name="description" content="Portafolio de Elvis Velásquez, Ingeniero en Informática enfocado en desarrollo web, automatización, SQL y soluciones full stack.">
    <meta name="keywords" content="Elvis Velásquez, Software Developer, Frontend, JavaScript, TypeScript, Django, Node.js, SQL, Chile">
    <meta name="author" content="Elvis Velasquez">

    <!--
      Open Graph: apariencia al compartir en redes sociales.
      IMPORTANTE: Actualiza og:url e og:image con tu dominio real
      cuando despliegues el sitio (ej: Netlify, Vercel, GitHub Pages).
    -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tudominio.com/">
    <meta property="og:title" content="Elvis Velásquez | Junior Software Developer">
    <meta property="og:description" content="Desarrollo soluciones web, automatización y aplicaciones orientadas al negocio.">
    <meta property="og:image" content="https://tudominio.com/img/FOTO_RETRATO.jpeg">

    <!--
      URL canónica: la URL "oficial" de este sitio para Google.
      IMPORTANTE: Actualiza con tu dominio real al desplegar.
    -->
    <link rel="canonical" href="https://tudominio.com/">

    <!--
      Feather Icons se carga ANTES que el script principal.
      dist/main.js llama a feather.replace() después de inyectar
      los componentes, por eso feather debe estar disponible ya.
    -->
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- Tipografías de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!--
      CSS principal: importa todos los módulos CSS desde src/css/
      Ver src/css/main.css para el orden de @import.
    -->
    <link rel="stylesheet" href="src/css/main.css">
</head>

<body>

    <!--
      CONTENEDORES DE COMPONENTES
      ============================
      Cada <div id="...-container"> es un "slot" vacío.
      dist/main.js llama a loadAllComponents() que carga
      el HTML de src/components/*.html y lo inyecta aquí.

      Después de que main.js ejecuta, el DOM se verá así:
        <div id="nav-container">
          <header><nav>...</nav></header>
        </div>
        etc.
    -->

    <!-- Slot: Barra de navegación (src/components/nav.html) -->
    <div id="nav-container"></div>

    <!--
      <main> envuelve el contenido principal de la página.
      Solo debe haber un <main> por documento (semántica HTML5).
      Los motores de búsqueda le dan mayor relevancia a este contenido.
    -->
    <main>
        <!-- Slot: Sección hero / presentación (src/components/hero.html) -->
        <div id="hero-container"></div>

        <!-- Slot: Experiencia laboral (src/components/experience.html) -->
        <div id="experience-container"></div>

        <!-- Slot: Certificaciones (src/components/certifications.html) -->
        <div id="certifications-container"></div>

        <!-- Slot: Proyectos (src/components/projects.html) -->
        <div id="projects-container"></div>

        <!-- Slot: Contacto (src/components/contact.html) -->
        <div id="contact-container"></div>
    </main>

    <!-- Slot: Pie de página (src/components/footer.html) -->
    <div id="footer-container"></div>


    <!--
      SCRIPT PRINCIPAL
      =================
      type="module" activa dos comportamientos importantes:
        1. Permite usar import/export (ES Modules)
        2. El script se ejecuta en modo "deferred" automáticamente
           (espera a que el DOM esté listo antes de ejecutar)

      Va al final del body para que feather-icons (cargado arriba)
      ya esté disponible como variable global cuando main.js corra.
    -->
    <script type="module" src="dist/main.js"></script>

</body>
</html>
